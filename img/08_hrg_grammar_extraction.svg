<text x="800.0" y="470.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#172026" text-anchor="start">LHS: N / rank</text>
<text x="800.0" y="498.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#172026" text-anchor="start"></text>
<text x="800.0" y="526.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#172026" text-anchor="start">RHS:</text>
<text x="800.0" y="554.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#172026" text-anchor="start">  terminal_edges = [(a, relation, b), ...]</text>
<text x="800.0" y="582.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#172026" text-anchor="start">  nonterminals = [N / rank with attachments]</text>
<text x="800.0" y="610.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#172026" text-anchor="start"></text>
<text x="800.0" y="638.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#172026" text-anchor="start">count = how often this structure appears</text>
