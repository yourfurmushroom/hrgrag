<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="850" viewBox="0 0 1500 850">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#5f6b73"/>
</marker>
<filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
<feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.12"/>
</filter>
</defs>
<rect x="0" y="0" width="1500" height="850" fill="white"/>
<text x="40.0" y="42.0" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#172026" text-anchor="start">MCS, triangulation, and clique-tree grammar extraction</text>
<text x="60.0" y="92.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#5f6b73" text-anchor="start">Conceptual local graph example</text>
<rect x="60.0" y="130.0" width="410.0" height="280.0" rx="8.0" fill="white" stroke="#c8d1d8" stroke-width="1" filter="url(#shadow)"/>
<text x="90.0" y="168.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#172026" text-anchor="start">1. Local skeleton</text>
<line x1="180.0" y1="260.0" x2="300.0" y2="200.0" stroke="#8b98a5" stroke-width="2.5" stroke-linecap="round"/>
<line x1="300.0" y1="200.0" x2="390.0" y2="300.0" stroke="#8b98a5" stroke-width="2.5" stroke-linecap="round"/>
<line x1="390.0" y1="300.0" x2="260.0" y2="350.0" stroke="#8b98a5" stroke-width="2.5" stroke-linecap="round"/>
<line x1="260.0" y1="350.0" x2="180.0" y2="260.0" stroke="#8b98a5" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="180.0" cy="260.0" r="28.0" fill="#8b98a5" stroke="white" stroke-width="2" filter="url(#shadow)"/>
<text x="180.0" y="266.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">M</text>
<circle cx="300.0" cy="200.0" r="28.0" fill="#8b98a5" stroke="white" stroke-width="2" filter="url(#shadow)"/>
<text x="300.0" y="206.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">D</text>
<circle cx="390.0" cy="300.0" r="28.0" fill="#8b98a5" stroke="white" stroke-width="2" filter="url(#shadow)"/>
<text x="390.0" y="306.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">C</text>
<circle cx="260.0" cy="350.0" r="28.0" fill="#8b98a5" stroke="white" stroke-width="2" filter="url(#shadow)"/>
<text x="260.0" y="356.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">G</text>
<text x="90.0" y="430.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#5f6b73" text-anchor="start">M=movie, D=director,</text>
<text x="90.0" y="450.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#5f6b73" text-anchor="start">C=country, G=genre</text>
<text x="90.0" y="470.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#5f6b73" text-anchor="start">4-cycle has no chord</text>
<rect x="545.0" y="130.0" width="410.0" height="280.0" rx="8.0" fill="white" stroke="#c8d1d8" stroke-width="1" filter="url(#shadow)"/>
<text x="575.0" y="168.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#172026" text-anchor="start">2. MCS + triangulation</text>
<line x1="665.0" y1="260.0" x2="785.0" y2="200.0" stroke="#8b98a5" stroke-width="2.5" stroke-linecap="round"/>
<line x1="785.0" y1="200.0" x2="875.0" y2="300.0" stroke="#8b98a5" stroke-width="2.5" stroke-linecap="round"/>
<line x1="875.0" y1="300.0" x2="745.0" y2="350.0" stroke="#8b98a5" stroke-width="2.5" stroke-linecap="round"/>
<line x1="745.0" y1="350.0" x2="665.0" y2="260.0" stroke="#8b98a5" stroke-width="2.5" stroke-linecap="round"/>
<line x1="785.0" y1="200.0" x2="745.0" y2="350.0" stroke="#c2410c" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 5"/>
<circle cx="665.0" cy="260.0" r="28.0" fill="#0f766e" stroke="white" stroke-width="2" filter="url(#shadow)"/>
<text x="665.0" y="266.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">M</text>
<circle cx="785.0" cy="200.0" r="28.0" fill="#0f766e" stroke="white" stroke-width="2" filter="url(#shadow)"/>
<text x="785.0" y="206.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">D</text>
<circle cx="875.0" cy="300.0" r="28.0" fill="#0f766e" stroke="white" stroke-width="2" filter="url(#shadow)"/>
<text x="875.0" y="306.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">C</text>
<circle cx="745.0" cy="350.0" r="28.0" fill="#0f766e" stroke="white" stroke-width="2" filter="url(#shadow)"/>
<text x="745.0" y="356.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">G</text>
<text x="795.0" y="287.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#c2410c" text-anchor="start">fill edge</text>
<text x="575.0" y="430.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#5f6b73" text-anchor="start">The fill edge is only for</text>
<text x="575.0" y="450.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#5f6b73" text-anchor="start">decomposition; it is not a</text>
<text x="575.0" y="470.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#5f6b73" text-anchor="start">new KG triple.</text>
<rect x="1030.0" y="130.0" width="410.0" height="280.0" rx="8.0" fill="white" stroke="#c8d1d8" stroke-width="1" filter="url(#shadow)"/>
<text x="1060.0" y="168.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#172026" text-anchor="start">3. Clique tree</text>
<rect x="1100.0" y="230.0" width="190.0" height="68.0" rx="8.0" fill="#f0fdfa" stroke="#0f766e" stroke-width="1"/>
<text x="1195.0" y="270.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#0f766e" text-anchor="middle">{M, D, G}</text>
<rect x="1100.0" y="330.0" width="190.0" height="68.0" rx="8.0" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1"/>
<text x="1195.0" y="370.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#7c3aed" text-anchor="middle">{D, C, G}</text>
<line x1="1195.0" y1="298.0" x2="1195.0" y2="330.0" stroke="#5f6b73" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
<text x="1230.0" y="320.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f6b73" text-anchor="start">separator {D,G}</text>
<text x="1060.0" y="430.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#5f6b73" text-anchor="start">Each bag becomes one local</text>
<text x="1060.0" y="450.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#5f6b73" text-anchor="start">grammar rule with external</text>
<text x="1060.0" y="470.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#5f6b73" text-anchor="start">attachment nodes.</text>
<rect x="95.0" y="570.0" width="1310.0" height="135.0" rx="8.0" fill="#ecfdf5" stroke="#86efac" stroke-width="1"/>
<text x="125.0" y="612.0" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#15803d" text-anchor="start">Why this matters for retrieval</text>
<text x="125.0" y="650.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#172026" text-anchor="start">Offline: repeated clique-tree bags become HRG-like structural priors.</text>
<text x="125.0" y="677.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#172026" text-anchor="start">Online: matching relation-path signatures helps rank compact executable evidence instead of expanding every BFS neighbor.</text>
<text x="125.0" y="704.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#172026" text-anchor="start">The triangulation edge is a decomposition artifact, not an added reverse relation or new KG fact.</text>
</svg>